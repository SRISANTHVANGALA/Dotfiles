# ===============================
# mpv v0.41 — Wayland + Hyprland
# Balanced: correct colors + no lag
# ===============================

# ---- Video output ----
vo=gpu-next
gpu-context=wayland

# ---- Hardware decoding ----
hwdec=auto-safe

# ---- Performance ----
video-sync=display-resample
interpolation=no
scale=bilinear
cscale=bilinear
dscale=bilinear

# ---- Color correctness (SDR) ----
video-output-levels=full
tone-mapping=clip

# ---- Wayland / Hyprland safety ----
icc-profile-auto=no
hdr-compute-peak=no

# ---- Disable expensive processing ----
deband=no

