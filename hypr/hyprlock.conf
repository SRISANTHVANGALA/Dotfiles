############################
# HYPRLOCK – STABLE CONFIG #
############################

general {
    hide_cursor = true
    grace = 0
    no_fade_in = true
    immediate_render = true
    ignore_empty_input = true
}

################
# BACKGROUND   #
################
background {
    monitor =
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    brightness = 0.6
}

################
# TIME (BIG)   #
################
label {
    monitor =
    text = cmd[update:1000] date "+%H:%M"
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
    color = rgba(255, 255, 255, 1)
    shadow_passes = 2
}

################
# DATE         #
################
label {
    monitor =
    text = cmd[update:60000] date "+%A, %d %B"
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
    color = rgba(200, 200, 200, 1)
}

################
# USERNAME     #
################
label {
    monitor =
    text = $USER
    font_size = 22
    position = 0, -40
    halign = center
    valign = center
    color = rgba(180, 180, 180, 1)
}

################
# PASSWORD BOX #
################
input-field {
    monitor =
    size = 260, 55
    position = 0, -110
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.3)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(255, 255, 255, 1)

    fade_on_empty = false
    rounding = 10
    placeholder_text = <i>Enter password</i>
}

################
# CAPS LOCK    #
################
label {
    monitor =
    text = cmd[update:1000] \
           bash -c '[[ $(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -n1) == 1 ]] && echo "CAPS LOCK ON"'
    font_size = 14
    position = 0, -170
    halign = center
    valign = center
    color = rgba(255, 100, 100, 1)
}

